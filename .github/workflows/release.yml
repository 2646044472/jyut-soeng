name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Validate bundled content
        run: |
          python3 tools/build_assets.py
          python3 tools/validate_content.py
          python3 tools/export_github_pack.py

      - name: Build and test
        run: |
          ./gradlew --no-daemon --console=plain :app:testDebugUnitTest :app:assembleRelease

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/yuet-soeng-${GITHUB_REF_NAME}.apk"
          zip -rq "release-artifacts/yuet-soeng-content-${GITHUB_REF_NAME}.zip" jyut-soeng

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 粤常 ${{ github.ref_name }}
          body: |
            粤常是一个用 Jyutping 辅助正音的粤语练习 App。

            这个 release 包含：
            - Android release APK
            - App 在线更新使用的内容包 zip
            - 词语正音与俚语 / 日常表达卡题库
          files: |
            release-artifacts/yuet-soeng-${{ github.ref_name }}.apk
            release-artifacts/yuet-soeng-content-${{ github.ref_name }}.zip
