name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Validate bundled content
        run: |
          python3 tools/validate_content.py

      - name: Build and test
        run: |
          ./gradlew --no-daemon --console=plain :app:testDebugUnitTest :app:assembleDebug

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk "release-artifacts/canto-calibrator-${GITHUB_REF_NAME}.apk"
          zip -rq "release-artifacts/canto-calibrator-content-${GITHUB_REF_NAME}.zip" canto-calibrator

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Canto Calibrator ${{ github.ref_name }}
          body: |
            jyut-soeng 即“粤常”的粤语拼音。

            希望粤语变成日常。

            这个 release 包含：
            - Android debug APK
            - App 在线更新使用的内容包 zip
          files: |
            release-artifacts/canto-calibrator-${{ github.ref_name }}.apk
            release-artifacts/canto-calibrator-content-${{ github.ref_name }}.zip
